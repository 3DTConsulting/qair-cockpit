<style>
  :root{
    --ink:#0A2F29; --ink2:#0E3A32; --panel:#103F35; --panel2:#0C362E;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
    --green:#1FA56B; --teal:#16A39A; --lime:#A8D55F; --blue:#5BB3D6; --amber:#E2B23C;
    --tx:#EAF3EE; --mut:#9DB7AC; --mut2:#7C988C;
    --serif:"Georgia","Cambria",serif; --sans:"Inter","Segoe UI","Helvetica Neue",Arial,sans-serif;
    --up:#46D38A; --dn:#F0A35A;
  }

  body{font-family:var(--sans);background:var(--ink);color:var(--tx);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  .serif{font-family:var(--serif)}
  button{font-family:inherit;cursor:pointer}

  header{grid-column:1/3;display:flex;align-items:center;gap:18px;padding:0 22px;background:var(--panel2);border-bottom:1px solid var(--line)}
  .logo{display:flex;align-items:baseline;gap:10px}
  .logo .q{font-weight:800;font-size:20px;letter-spacing:.02em;color:#fff}
  .logo .vc{font-size:13px;color:var(--lime);font-weight:700;letter-spacing:.04em}
  .pulse{margin-left:6px;display:inline-flex;align-items:center;gap:6px;font-size:10.5px;color:#8FE6B8;font-weight:700;letter-spacing:.08em;border:1px solid rgba(70,211,138,.3);padding:3px 9px;border-radius:999px}
  .pdot{width:7px;height:7px;border-radius:50%;background:#46D38A;animation:blink 1.6s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .spacer{flex:1}
  .clock{font-variant-numeric:tabular-nums;color:var(--mut);font-size:12.5px;letter-spacing:.03em}
  .lang{display:flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden}
  .lang button{background:transparent;color:var(--mut);border:0;padding:6px 13px;font-size:12px;font-weight:700}
  .lang button.on{background:var(--lime);color:#0A2F29}
  .powered{font-size:11px;color:var(--mut2)}
  .powered b{color:var(--tx);font-weight:700}

  /* SIDEBAR */
  aside{background:var(--panel2);border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
  .navlabel{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);padding:10px 12px 6px}
  .nav{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;color:var(--mut);font-size:13.5px;font-weight:600;border:1px solid transparent;transition:.15s;background:transparent;width:100%;text-align:left}
  .nav:hover{background:rgba(255,255,255,.04);color:var(--tx)}
  .nav.on{background:rgba(168,213,95,.12);color:#fff;border-color:rgba(168,213,95,.3)}
  .nav .gi{width:20px;text-align:center;font-size:15px}
  .nav .badge{margin-left:auto;font-size:10px;background:var(--lime);color:#0A2F29;font-weight:800;border-radius:999px;padding:1px 7px}
  .aside-foot{margin-top:auto;padding:12px;font-size:10.5px;color:var(--mut2);line-height:1.5;border-top:1px solid var(--line)}

  /* MAIN */
  main{overflow-y:auto;padding:26px 30px 60px}
  .view{display:none;animation:fade .35s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .vhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .vhead h1{font-family:var(--serif);font-size:25px;font-weight:700;color:#fff}
  .vhead .sub{color:var(--mut);font-size:13.5px;margin-top:4px}
  .vhead .asof{font-size:11.5px;color:var(--mut2)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;transition:.18s;cursor:pointer}
  .kpi:hover{border-color:var(--line2);transform:translateY(-2px)}
  .kpi .t{display:flex;align-items:center;justify-content:space-between}
  .kpi .nm{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
  .kpi .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .kpi h3{font-family:var(--serif);font-size:16px;color:#fff;margin:9px 0 2px;font-weight:700}
  .kpi .d{color:var(--mut);font-size:11.5px;min-height:30px}
  .kpi .m{display:flex;align-items:baseline;gap:8px;margin-top:8px}
  .kpi .big{font-family:var(--serif);font-size:25px;color:#fff;font-weight:700}
  .kpi .chg{font-size:11.5px;font-weight:700}
  .up{color:var(--up)} .dn{color:var(--dn)}

  .card h2{font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--tx);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .card .cap{color:var(--mut);font-size:12px;margin-bottom:14px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--mut);margin-top:10px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--mut2);font-weight:700;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line);color:var(--tx);vertical-align:top}
  tr:last-child td{border-bottom:0}
  tr:hover td{background:rgba(255,255,255,.025)}
  .co{font-weight:700;color:#fff}
  .tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;letter-spacing:.04em}
  .tag.ma{background:rgba(91,179,214,.16);color:#9AD4ED}
  .tag.eq{background:rgba(168,213,95,.16);color:var(--lime)}
  .tag.debt{background:rgba(226,178,60,.16);color:#F0CE7E}
  .amt{font-family:var(--serif);font-weight:700;color:#fff;white-space:nowrap}
  .src{font-size:10px;color:var(--mut2)}

  .feed{display:flex;flex-direction:column;gap:0}
  .fitem{display:grid;grid-template-columns:78px 1fr;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .fitem:last-child{border-bottom:0}
  .fdate{font-size:11px;color:var(--lime);font-weight:700;padding-top:2px}
  .fitem h4{font-size:13px;color:#fff;margin-bottom:3px}
  .fitem p{font-size:12px;color:var(--mut);line-height:1.45}
  .pill2{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--mut2);border:1px solid var(--line2);border-radius:999px;padding:1px 8px;margin-bottom:5px}

  .gridfund{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(max-width:760px){.gridfund{grid-template-columns:1fr}}
  .fund{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .fund .fb{font-family:var(--serif);font-size:22px;color:var(--lime);font-weight:700}
  .fund .fl{font-size:12px;color:#fff;font-weight:700;margin:2px 0 4px}
  .fund .fd{font-size:11.5px;color:var(--mut)}

  .statline{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
  @media(max-width:760px){.statline{grid-template-columns:1fr}}
  .sbox{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px}
  .sbox .sb{font-family:var(--serif);font-size:30px;color:#fff;font-weight:700;line-height:1}
  .sbox .sl{font-size:11.5px;color:var(--mut);margin-top:6px}

  .gaugewrap{display:flex;align-items:center;gap:18px;margin-top:6px}
  .barbg{flex:1;height:12px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
  .barfill{height:100%;border-radius:999px}

  .regime{font-size:11px;font-weight:800;letter-spacing:.06em;padding:3px 11px;border-radius:999px;margin-left:10px;vertical-align:middle}
  .toggle{display:flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden}
  .toggle button{background:transparent;color:var(--mut);border:0;padding:7px 15px;font-size:11.5px;font-weight:700}
  .toggle button.on{background:var(--lime);color:#0A2F29}
  .strat{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media(max-width:760px){.strat{grid-template-columns:1fr}}
  .strat .st{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .strat .st h4{font-size:13.5px;color:#fff;margin:8px 0 4px}
  .strat .st p{font-size:12px;color:var(--mut);line-height:1.45}
  .imp{font-size:12px;color:var(--mut);line-height:1.55}
  .imp ul{margin:8px 0 0 0;padding-left:18px}
  .imp li{margin-bottom:6px}
  .note{margin-top:18px;font-size:11px;color:var(--mut2);border-top:1px solid var(--line);padding-top:12px;line-height:1.6}
  a.srclink{display:block;text-decoration:none;color:inherit;border-radius:12px;transition:.15s}
  a.srclink:hover{background:rgba(22,163,154,.08);outline:1px solid var(--line2)}
  a.exta{color:var(--teal);text-decoration:none;font-weight:700;white-space:nowrap}
  a.exta:hover{text-decoration:underline}
  tr.lk{cursor:pointer}
  tr.lk:hover td{background:rgba(22,163,154,.07)}
  .srcchip{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--teal);border:1px solid var(--line2);border-radius:999px;padding:6px 13px;text-decoration:none;margin-top:14px}
  .srcchip:hover{background:rgba(22,163,154,.12)}
  .ext{font-size:10px;opacity:.85}
  .chartbox{width:100%}
  svg text{font-family:var(--sans)}
</style>
</head>

/* ---------- charts (inline SVG) ---------- */
function lineChart(data, color, w=520, h=210, fill=true, unit=""){
  const pad={l:36,r:14,t:14,b:26};
  const vals=data.map(d=>d.v!==undefined?d.v:d);
  const max=Math.max(...vals)*1.06, min=Math.min(...vals)*0.92;
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const X=i=>pad.l+(iw*i/(vals.length-1));
  const Y=v=>pad.t+ih-((v-min)/(max-min))*ih;
  let pts=vals.map((v,i)=>`${X(i)},${Y(v)}`).join(" ");
  let area=`${pad.l},${pad.t+ih} `+pts+` ${X(vals.length-1)},${pad.t+ih}`;
  let grid="";
  for(let g=0;g<=3;g++){const yy=pad.t+ih*g/3;const vv=(max-(max-min)*g/3);
    grid+=`<line x1="${pad.l}" y1="${yy}" x2="${w-pad.r}" y2="${yy}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;
    grid+=`<text x="${pad.l-6}" y="${yy+3}" text-anchor="end" font-size="9" fill="#7C988C">${Math.round(vv)}</text>`;}
  let labs=data.map((d,i)=>`<text x="${X(i)}" y="${h-8}" text-anchor="middle" font-size="9.5" fill="#9DB7AC">${d.x!==undefined?d.x:""}</text>`).join("");
  let dots=vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="3" fill="${color}"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" class="chartbox" preserveAspectRatio="xMidYMid meet">
    ${grid}
    ${fill?`<polygon points="${area}" fill="${color}" opacity="0.12"/>`:""}
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${labs}</svg>`;
}

      </div>
    </div>
    <div class="imp" style="margin-top:10px">${L?`Le spread spot→Cal+1 ressort à ${(z>=0?'+':'')}${z.toFixed(1)} écart-type de sa moyenne historique — ${Math.abs(z)<1?'dans la norme':'tendu : fenêtre d\'arbitrage à terme'}.`:`The spot→Cal+1 spread sits ${(z>=0?'+':'')}${z.toFixed(1)} std-dev from its historical mean — ${Math.abs(z)<1?'within norm':'stretched: a forward arbitrage window'}.`}</div>
  </div>

  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div><h2 style="margin:0">♟ ${L?'Stratégies de trading & couverture':'Trading & hedging playbook'}</h2>
      <div class="cap" style="margin:4px 0 0">${L?'Recommandations selon le régime de marché et la posture de Qair.':'Recommendations by market regime and Qair posture.'}</div></div>
      ${tgl}
    </div>
    <div class="strat">${cards}</div>
  </div>

  <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
    <a class="srcchip" href="${INSTR.trade.url}" target="_blank" rel="noopener">${INSTR.trade[state.lang]} ↗</a>
    <a class="srcchip" href="${INSTR.rates.url}" target="_blank" rel="noopener">${INSTR.rates[state.lang]} ↗</a>
  </div>
  <div class="note">${L?'Données illustratives (dernière clôture indicative) — à connecter à un flux EEX / Bloomberg / Refinitiv et BCE en production. 3DT évalue et sélectionne ; les décisions de marché restent celles de Qair.':'Illustrative data (indicative last close) — to be connected to an EEX / Bloomberg / Refinitiv & ECB feed at deployment. 3DT evaluates and selects; market decisions remain Qair\'s.'}</div>`;
}

function vCarb(){
  const L=state.lang==='fr';
  const view=state.euaView||'bull';
  const eua=_stats(EUA_HIST), eVol=_annVol(EUA_HIST), ePct=_pct(EUA_HIST,EUA_HIST[EUA_HIST.length-1]);
  const cur=EUA_HIST[EUA_HIST.length-1];
  const histData=datedSeries(EUA_HIST, state.lang, 3);

  let R=[]; const tg=(t,h,b)=>R.push(`<div class="st"><span class="tag eq">${t}</span><h4>${h}</h4><p>${b}</p></div>`);
  tg(L?`GARANTIES D'ORIGINE`:`GUARANTEES OF ORIGIN`, L?`Vendre les GOs (non bundlées)`:`Sell GOs (unbundled)`, L?`Chaque MWh vert porte une Garantie d'Origine monétisable auprès des fournisseurs et corporates (marché AIB), séparément de l'électron.`:`Each green MWh carries a Guarantee of Origin monetizable to suppliers and corporates (AIB market), separately from the electron.`);
  if(view==='bull'){
    tg(`ETS ↑`, L?`Capter le pic ETS`:`Capture the ETS peak`, L?`EUA élevé (~${cur} €/t) : il relève le prix de gros (vendez à terme, onglet Trading) et soutient la demande de GOs — monétisez une part maintenant.`:`High EUA (~€${cur}/t): it lifts wholesale prices (sell forward, Trading tab) and supports GO demand — monetize a share now.`);
  } else {
    tg(`ETS ↓`, L?`Sécuriser un plancher`:`Secure a floor`, L?`EUA en repli : couvrir une part du revenu carbone via forwards EUA / contrats GO pluriannuels, conserver le reste.`:`EUA softening: hedge part of carbon revenue via EUA forwards / multi-year GO contracts, hold the rest.`);
  }
  tg(L?`CRÉDITS VOLONTAIRES`:`VOLUNTARY CREDITS`, L?`Marchés émergents`:`Emerging markets`, L?`Là où Qair déplace un réseau fossile (Brésil, Afrique), les projets peuvent émettre des crédits (Verra / Gold Standard) — additionnalité réelle, valeur directe.`:`Where Qair displaces a fossil grid (Brazil, Africa), projects can issue credits (Verra / Gold Standard) — real additionality, direct value.`);
  tg(L?`PPA VERT`:`GREEN PPA`, L?`Prime verte bundlée`:`Bundled green premium`, L?`Vendre électricité + GO ensemble à un corporate (RE100) capture une prime verte sur le PPA.`:`Selling power + GO bundled to a corporate (RE100) captures a green premium on the PPA.`);
  const cards=R.join('');

  const toggle=`<div class="toggle">
    <button class="${view==='bull'?'on':''}" onclick="setEua('bull')">${L?'Marché EUA haussier':'EUA bullish'}</button>
    <button class="${view==='bear'?'on':''}" onclick="setEua('bear')">${L?'EUA baissier':'EUA bearish'}</button>
  </div>`;

  return `
  <div class="cols2">
    <div class="card">
      <h2>❖ ${L?'EUA — prix du carbone (€/t)':'EUA — carbon price (€/t)'}</h2>
      <div class="cap">${L?'Historique mensuel — marché EU ETS (ICE / Bloomberg)':'Monthly history — EU ETS market (ICE / Bloomberg)'}</div>
      ${lineChart(histData,'#1FA56B',560,205,true)}
      <div class="statline" style="grid-template-columns:1fr 1fr 1fr;margin-top:14px">
        ${sbox('~€'+cur, L?'dernier (juin 2026)':'last (June 2026)','--green')}
        ${sbox(eVol.toFixed(0)+'%', L?'volatilité annualisée':'annualized volatility','--teal')}
        ${sbox(ePct+'%', L?'percentile (période)':'percentile (period)','--blue')}
      </div>
    </div>
    <div class="card">
      <h2>${L?'Pourquoi le carbone rapporte à Qair':'Why carbon pays for Qair'}</h2>
      <div class="cap">${L?'Deux canaux financiers, selon la nature du réseau alimenté.':'Two financial channels, depending on the grid supplied.'}</div>
      <div class="imp">
        <p style="margin-bottom:10px"><b style="color:var(--tx)">${L?'1 · Indirect — ETS → prix du power':'1 · Indirect — ETS → power price'}</b><br>${L?`Qair ne reçoit pas d'EUA, mais un carbone cher relève le prix de gros via le merit order : chaque MWh vert se vend plus cher. Un EUA ~${cur} €/t soutient toute la courbe forward électricité.`:`Qair receives no EUAs, but expensive carbon lifts wholesale prices via the merit order: every green MWh sells higher. An EUA ~€${cur}/t supports the whole power forward curve.`}</p>
        <p><b style="color:var(--tx)">${L?'2 · Direct — attributs verts':'2 · Direct — green attributes'}</b><br>${L?`Garanties d'Origine (1 MWh = 1 GO, marché AIB) vendues aux fournisseurs/corporates ; en marchés émergents où Qair déplace un réseau fossile, crédits carbone volontaires (Verra / Gold Standard).`:`Guarantees of Origin (1 MWh = 1 GO, AIB market) sold to suppliers/corporates; in emerging markets where Qair displaces a fossil grid, voluntary carbon credits (Verra / Gold Standard).`}</p>
      </div>
      <div class="statline" style="grid-template-columns:1fr 1fr;margin-top:10px">
        ${sbox('~1–5 €', L?'GO (€/MWh, < 1 € proche)':'GO (€/MWh, < €1 near-dated)','--lime')}
        ${sbox('Verra', L?'crédits volontaires (émergents)':'voluntary credits (emerging)','--blue')}
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div><h2 style="margin:0">♟ ${L?'Intérêt financier & stratégies carbone':'Carbon value & strategies'}</h2>
      <div class="cap" style="margin:4px 0 0">${L?'Comment Qair monétise le carbone selon le marché et ses actifs.':'How Qair monetizes carbon by market and asset base.'}</div></div>
      ${toggle}
    </div>
    <div class="strat">${cards}</div>
  </div>

  <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
    <a class="srcchip" href="${INSTR.carb.url}" target="_blank" rel="noopener">${INSTR.carb[state.lang]} ↗</a>
    <a class="srcchip" href="${INSTR.go.url}" target="_blank" rel="noopener">${INSTR.go[state.lang]} ↗</a>
  </div>
  <div class="note">${L?'EUA, GOs et crédits volontaires illustratifs — à brancher sur ICE / Bloomberg / AIB / Verra en production. Rappel : un producteur renouvelable ne reçoit pas d\'EUA ; la valeur vient du pass-through ETS, des Garanties d\'Origine et, en marchés émergents, des crédits volontaires. 3DT évalue et sélectionne ; les décisions restent celles de Qair.':'EUA, GOs and voluntary credits illustrative — to be connected to ICE / Bloomberg / AIB / Verra at deployment. Reminder: a renewable producer receives no EUAs; value comes from ETS pass-through, Guarantees of Origin and, in emerging markets, voluntary credits. 3DT evaluates and selects; decisions remain Qair.'}</div>`;
}

function vTreas(){
  const alloc=[["--blue",64],["--green",24],["--mut",12]];
  let bars=`<div style="display:flex;height:16px;border-radius:999px;overflow:hidden;margin:8px 0 4px">
     <div style="width:64%;background:var(--blue)"></div><div style="width:24%;background:var(--green)"></div><div style="width:12%;background:rgba(255,255,255,.18)"></div></div>
     <div class="legend"><span><i style="background:var(--blue)"></i>Tokenized treasury 64%</span><span><i style="background:var(--green)"></i>MMF / T-bills 24%</span><span><i style="background:rgba(255,255,255,.3)"></i>Bank deposits 12%</span></div>`;
  return `<div class="statline">
      ${sbox(t('tz_b1'),t('tz_b1l'),'--blue')}${sbox(t('tz_b2'),t('tz_b2l'),'--green')}${sbox(t('tz_b3'),t('tz_b3l'),'--lime')}
    </div>
    <div class="cols2" style="margin-top:16px">
      <div class="card"><h2>▤ ${t('tz_alloc')}</h2><div class="cap">${t('tz_alloccap')}</div>${bars}
        <div style="margin-top:18px"><div style="font-size:12.5px;color:#fff;font-weight:700">${t('tz_idle')}</div>
        <div class="cap" style="margin:6px 0 8px">${t('tz_idlel')}</div>
        <div class="gaugewrap"><div class="barbg"><div class="barfill" style="width:64%;background:var(--blue)"></div></div><b style="color:var(--blue)">64%</b></div></div>
      </div>
      <div class="card"><h2>⚡ ${t('tz_off')}</h2><div class="cap">${t('tz_offcap')}</div>
        <div style="display:flex;gap:14px;align-items:center;margin-top:14px">
          <div style="font-family:var(--serif);font-size:40px;color:var(--lime);font-weight:700">100%</div>
          <div style="font-size:12.5px;color:var(--mut)">${state.lang==='fr'?"des excédents redirigés vers un débouché captif et stable, sans dépendre de la volatilité d'un actif minier.":"of surplus output redirected to a stable captive outlet, without depending on a mining asset's volatility."}</div>
        </div>
      </div>
    </div>
    <div><a class="srcchip" href="${INSTR.treas.url}" target="_blank" rel="noopener">${INSTR.treas[state.lang]} ↗</a></div><div class="note">${t('tz_note')}</div>`;
}
const VIEWS={over:{h:'ov_h',s:'ov_s',f:vOverview},mkt:{h:'mk_h',s:'mk_s',f:vMarket},
  trade:{h:'tr_h',s:'tr_s',f:vTrade},carb:{h:'cb_h',s:'cb_s',f:vCarb},treas:{h:'tz_h',s:'tz_s',f:vTreas}};

/* ---------- shell render ---------- */
function renderAside(){
  let html=`<div class="navlabel">${t('navmain')}</div>`;
  NAV.forEach((n,i)=>{
    if(i===1) html+=`<div class="navlabel">${t('navtools')}</div>`;
    const on=state.view===n[0]?'on':'';
    const badge=n[0]==='mkt'?`<span class="badge">${DEALS.length}</span>`:'';
    html+=`<button class="nav ${on}" onclick="go('${n[0]}')"><span class="gi">${n[2]}</span>${t(n[1])}${badge}</button>`;
  });
  html+=`<div class="aside-foot">${t('asfoot')}</div>`;
  document.getElementById('aside').innerHTML=html;
}
function renderMain(){
  const v=VIEWS[state.view];
  document.getElementById('main').innerHTML=`<div class="view on">
    <div class="vhead"><div><h1>${t(v.h)}</h1><div class="sub">${t(v.s)}</div></div>
    <div class="asof">${t('asof')}</div></div>${v.f()}</div>`;
}
function renderHeader(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.innerHTML=t(el.getAttribute('data-i18n'));});
}
function go(view){state.view=view;renderAside();renderMain();}
function setPosture(p){state.posture=p;renderMain();}
function setEua(p){state.euaView=p;renderMain();}
function setLang(l){state.lang=l;document.documentElement.lang=l;
  document.getElementById('fr').classList.toggle('on',l==='fr');
  document.getElementById('en').classList.toggle('on',l==='en');
  renderHeader();renderAside();renderMain();}

function tick(){const d=new Date();
  document.getElementById('clock').textContent=d.toLocaleString(state.lang==='fr'?'fr-FR':'en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' CET';}
setInterval(tick,1000);tick();
renderHeader();renderAside();renderMain();
</script>
</body>
</html>
